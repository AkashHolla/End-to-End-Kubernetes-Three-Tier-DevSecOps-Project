apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier
  labels:
    role: frontend
    env: demo
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels:
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec:
      containers:
        - name: frontend
          image: 812200312469.dkr.ecr.us-east-1.amazonaws.com/frontend:0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500"
              memory: "512Mi"
          env:
            - name: REACT_APP_BACKEND_URL
              value: "http://amanpathakdevops.study/api/tasks"
          ports:
            - containerPort: 3000
      imagePullSecrets:
        - name: ecr-registry-secret
